name: Build Kotlin APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3️⃣ Show files for debugging (optional)
      - name: List Files
        run: ls -R

      # 4️⃣ Make gradlew executable
      - name: Make Gradlew Executable
        run: chmod +x ./AndroidApp/gradlew

      # 5️⃣ Build APK
      - name: Build Debug APK
        run: ./AndroidApp/gradlew assembleDebug

      # 6️⃣ Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kotlin-App-APK
          path: AndroidApp/app/build/outputs/apk/debug/app-debug.apk
